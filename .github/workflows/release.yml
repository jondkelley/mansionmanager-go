name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Package (${{ matrix.asset_suffix }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_suffix: amd64
            goarm: ""
          - goos: linux
            goarch: arm64
            asset_suffix: arm64
            goarm: ""
          - goos: linux
            goarch: arm
            asset_suffix: armv7
            goarm: "7"
          - goos: linux
            goarch: "386"
            asset_suffix: "386"
            goarm: ""
    steps:
      - uses: actions/checkout@v4

      - name: Locate palace-manager module
        id: locate
        run: |
          set -euo pipefail
          if [[ -f go.mod && -d cmd/palace-manager ]]; then
            echo "module-root=." >> "${GITHUB_OUTPUT}"
            echo "go-mod-path=go.mod" >> "${GITHUB_OUTPUT}"
          else
            found=0
            for d in */; do
              [[ -d "${d}" ]] || continue
              d="${d%/}"
              if [[ -f "${d}/go.mod" && -d "${d}/cmd/palace-manager" ]]; then
                echo "module-root=${d}" >> "${GITHUB_OUTPUT}"
                echo "go-mod-path=${d}/go.mod" >> "${GITHUB_OUTPUT}"
                found=1
                break
              fi
            done
            if [[ "${found}" -ne 1 ]]; then
              echo "No go.mod + cmd/palace-manager at repo root or in a top-level subdirectory." >&2
              ls -la >&2
              exit 1
            fi
          fi

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ steps.locate.outputs.go-mod-path }}

      - name: Build release tarball
        working-directory: ${{ steps.locate.outputs.module-root }}
        env:
          TAG: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          ASSET_ARCH: ${{ matrix.asset_suffix }}
        run: ./scripts/package-release.sh

      - uses: actions/upload-artifact@v4
        with:
          name: release-tarball-${{ matrix.asset_suffix }}
          path: dist/*.tar.gz

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Locate palace-manager module
        id: locate
        run: |
          set -euo pipefail
          if [[ -f go.mod && -d cmd/palace-manager ]]; then
            echo "module-root=." >> "${GITHUB_OUTPUT}"
          else
            found=0
            for d in */; do
              [[ -d "${d}" ]] || continue
              d="${d%/}"
              if [[ -f "${d}/go.mod" && -d "${d}/cmd/palace-manager" ]]; then
                echo "module-root=${d}" >> "${GITHUB_OUTPUT}"
                found=1
                break
              fi
            done
            if [[ "${found}" -ne 1 ]]; then
              echo "No palace-manager module found" >&2
              ls -la >&2
              exit 1
            fi
          fi

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-tarball-*
          merge-multiple: true

      - name: Attach setup.sh and checksums
        run: |
          set -euo pipefail
          MOD="${{ steps.locate.outputs.module-root }}"
          cp "${MOD}/deploy/setup.sh" dist/setup.sh
          chmod +x dist/setup.sh
          cd dist
          ls -la
          sha256sum *.tar.gz setup.sh > SHA256SUMS
          cat SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/setup.sh
            dist/SHA256SUMS
