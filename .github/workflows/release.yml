name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Package (${{ matrix.asset_suffix }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_suffix: amd64
            goarm: ""
          - goos: linux
            goarch: arm64
            asset_suffix: arm64
            goarm: ""
          - goos: linux
            goarch: arm
            asset_suffix: armv7
            goarm: "7"
          - goos: linux
            goarch: "386"
            asset_suffix: "386"
            goarm: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release tarball
        env:
          TAG: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          ASSET_ARCH: ${{ matrix.asset_suffix }}
        run: ./scripts/package-release.sh

      - uses: actions/upload-artifact@v4
        with:
          name: release-tarball-${{ matrix.asset_suffix }}
          path: dist/*.tar.gz

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-tarball-*
          merge-multiple: true

      - name: Write SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          ls -la
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
